name: Build Signed Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.6

      - name: Create local.properties from secrets
        run: |
          echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" >> local.properties
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> local.properties
          echo "BIBLE_API_KEY=${{ secrets.BIBLE_API_KEY }}" >> local.properties

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: dailyverse-release-v${{ github.event.inputs.version_name }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
